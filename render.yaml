services:
  # Backend API Service
  - type: web
    name: voicerag-backend
    env: python
    region: oregon
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      sh -c "echo [startup] PORT=$PORT &&
      exec python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-10000} --log-level info"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEB_CONCURRENCY
        value: "1"
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2
      - key: ELEVENLABS_VOICE_ID_EN
        value: EXAVITQu4vr4xnSDxMaL
      - key: ELEVENLABS_VOICE_ID_HI
        value: EXAVITQu4vr4xnSDxMaL
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: voicerag-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://voicerag-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
